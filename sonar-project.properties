sonar.projectKey=website
sonar.projectName=website
sonar.projectVersion=0.1.0

sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/**/*.ts,src/**/*.vue,src/**/*.js
sonar.exclusions=src/**/*.backup,node_modules/**,dist/**,coverage/**

sonar.test.inclusions=tests/**/*.spec.ts,tests/**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
